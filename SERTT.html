max-width:180px;width:100%;height:auto;object-fit:contain;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.3));transition:all 0.25s ease;border-radius:1rem;}.logo-image:hover{transform:scale(1.02);filter:drop-shadow(0 12px 24px rgba(0,160,255,0.2));}.text-content{margin:1rem 0 0.5rem;}.primary-message{font-size:clamp(1.5rem,5.5vw,2.2rem);font-weight:600;line-height:1.3;background:linear-gradient(135deg,#ffffff 0%,#b0e0ff 100%);background-clip:text;-webkit-background-clip:text;color:transparent;letter-spacing:-0.02em;margin-bottom:1rem;}.thankyou-text{font-size:clamp(1rem,4vw,1.2rem);color:rgba(210,230,255,0.9);font-weight:450;line-height:1.5;margin-top:0.5rem;}.orange-accent{width:80px;height:3px;background:linear-gradient(90deg,#FF8C42,#FF5E1A,#FFB347);border-radius:4px;margin:1.5rem auto 0;box-shadow:0 0 12px rgba(255,94,26,0.5);transition:width 0.3s ease;}.notice-card:hover .orange-accent{width:110px;}.support-note{margin-top:1.8rem;font-size:0.8rem;color:rgba(160,190,230,0.7);display:flex;align-items:center;justify-content:center;gap:0.5rem;letter-spacing:0.3px;}.support-note::before,.support-note::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,0.4),transparent);}.support-note span{font-size:0.75rem;font-weight:400;}@media (max-width:520px){.notice-card{padding:1.8rem 1.5rem;border-radius:1.5rem;}.logo-image{max-width:140px;}.primary-message{margin-bottom:0.75rem;}.orange-accent{margin-top:1.2rem;}}@keyframes subtleGlow{0%{box-shadow:0 0 5px rgba(0,160,255,0.2);}100%{box-shadow:0 0 20px rgba(255,100,30,0.15);}}.notice-card{animation:subtleGlow 3s infinite alternate;}.logo-note{position:fixed;bottom:16px;right:16px;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);padding:4px 12px;border-radius:40px;font-size:0.7rem;color:rgba(255,200,150,0.7);font-family:monospace;z-index:10;pointer-events:none;letter-spacing:0.3px;}.page-background{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:-1;background-image:url('
